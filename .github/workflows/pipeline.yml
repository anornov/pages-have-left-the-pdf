name: my_pdf_pipeline_proyect

# Exam GH-200: Here the "Trigger" is defined
on:
  push:
    branches: [ "main" ]

jobs:
  # Job 1
  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Clone code
        uses: actions/checkout@v7

      - name: Set the Python environment
        uses: actions/setup-python@v6 #Take a look at the latest version of this action in the marketplace
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run linters (Flake8)
        run: flake8 main.py

  # Job 2
  validate-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Clone code
        uses: actions/checkout@v7

      - name: Simulate tests for Terraform
        run: echo "Validating Terraform files..."

  # Job 3
  build-docker:
    runs-on: ubuntu-latest
    needs: [test-python, validate-infra] # Exam GH-200: This forces the sequential order
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clone code
        uses: actions/checkout@v7

      # Exam GH-200: Secure authentication to GitHub Container Registry (GHCR) using the built-in GITHUB_TOKEN
      - name: Login to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }} # Your GitHub username dynamically
          password: ${{ secrets.GITHUB_TOKEN }} # Temporary automatic security key

      # Exam GH-200: set Buildx, docker modern engine for building images
      - name: Set Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      # Exam GH-200: build and push the image using a action from the marketplace
      - name: Build and push docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true # Now is true to push to GHCR
          tags: ghcr.io/${{ github.repository }}:latest #This is the official format