name: my_pdf_pipeline_proyect

# Exam GH-200: Here the "Trigger" is defined
on:
  push:
    branches: [ "main" ]

jobs:
  # Job 1
  test-python:
    runs-on: ubuntu-latest
    steps:
      - name: Clone code
        uses: actions/checkout@v7

      - name: Set the Python environment
        uses: actions/setup-python@v6 #Take a look at the latest version of this action in the marketplace
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run linters (Flake8)
        run: flake8 main.py

  # Job 2
  validate-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Clone code
        uses: actions/checkout@v7

      - name: Simulate tests for Terraform
        run: echo "Validating Terraform files..."

  # Job 3
  build-docker:
    runs-on: ubuntu-latest
    needs: [test-python, validate-infra] # Exam GH-200: This forces the sequential order
    steps:
      - name: Clone code
        uses: actions/checkout@v7

      - name: Simulate Docker build
        run: echo "Both previous jobs passed successfully. Building Docker image..."
